<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Diferencia de votos ONPE</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    text-align:center;
    padding-top:50px;
}

.card{
    background:white;
    width:600px;
    margin:auto;
    padding:30px;
    border-radius:12px;
    box-shadow:0 0 15px rgba(0,0,0,0.15);
}

.valor{
    font-size:32px;
    font-weight:bold;
    color:#003366;
}

.diferencia{
    font-size:42px;
    color:#cc0000;
    font-weight:bold;
}

.actualizacion{
    color:gray;
    margin-top:20px;
}
</style>

</head>
<body>

<div class="card">

<h1>Diferencia de votos ONPE</h1>

<p>Sánchez</p>
<div id="sanchez" class="valor">Cargando...</div>

<p>Keiko</p>
<div id="keiko" class="valor">Cargando...</div>

<p>Diferencia</p>
<div id="diferencia" class="diferencia">Cargando...</div>

<div id="hora" class="actualizacion">
Actualizando...
</div>

</div>

<script>

async function actualizar() {

    try {

        const respuesta = await fetch(
        "https://resultadosegundavuelta.onpe.gob.pe/presentacion-backend/resumen-general/participantes?idEleccion=10&tipoFiltro=eleccion"
        );

        const datos = await respuesta.json();

        const keiko = datos.data[0];
        const sanchez = datos.data[1];

        document.getElementById("keiko").innerHTML =
            Number(keiko.totalVotosValidos).toLocaleString();

        document.getElementById("sanchez").innerHTML =
            Number(sanchez.totalVotosValidos).toLocaleString();

        const diferencia =
            Math.abs(
                Number(keiko.totalVotosValidos) -
                Number(sanchez.totalVotosValidos)
            );

        document.getElementById("diferencia").innerHTML =
            diferencia.toLocaleString();

        document.getElementById("hora").innerHTML =
            "Actualizado: " + new Date().toLocaleTimeString();

    catch(error){

    document.getElementById("hora").innerHTML =
        "Error: " + error;

    console.error(error);
}
    }
}

actualizar();

setInterval(actualizar, 60000);

</script>

</body>
</html>
